<body>

<h1>Grade Weight Visualizer</h1>

<div id="categories"></div>

<button onclick="addCategory()">Add Category</button>
<button onclick="updateChart()">Calculate</button>

<h2 id="finalGrade"></h2>

<canvas id="gradeChart"></canvas>

<script>
let chart;
let categoryCount = 0;
const maxCategories = 10;

function addCategory() {

  if (categoryCount >= maxCategories) {
    alert("Maximum of 10 categories.");
    return;
  }

  categoryCount++;

  const div = document.createElement("div");
  div.className = "row";

  div.innerHTML = `
    Category:
    <input type="text" id="name${categoryCount}" placeholder="Homework">

    Grade:
    <input type="number" id="grade${categoryCount}" placeholder="90">

    Weight:
    <input type="number" id="weight${categoryCount}" placeholder="20">
  `;

  document.getElementById("categories").appendChild(div);
}

function updateChart() {

  let labels = [];
  let weights = [];

  let totalWeighted = 0;
  let totalWeight = 0;

  for (let i = 1; i <= categoryCount; i++) {

    const name = document.getElementById(`name${i}`).value || `Category ${i}`;

    const grade = Number(document.getElementById(`grade${i}`).value);

    const weight = Number(document.getElementById(`weight${i}`).value);

    if (!isNaN(grade) && !isNaN(weight) && weight > 0) {

      labels.push(name);
      weights.push(weight);

      totalWeighted += grade * weight;
      totalWeight += weight;
    }
  }

  const final = totalWeight > 0
    ? (totalWeighted / totalWeight).toFixed(1)
    : 0;

  document.getElementById("finalGrade").innerText =
    `Final Grade: ${final}%`;

  if (chart) {
    chart.destroy();
  }

  chart = new Chart(
    document.getElementById('gradeChart'),
    {
      type: 'pie',
      data: {
        labels: labels,
        datasets: [{
          data: weights
        }]
      }
    }
  );
}

for (let i = 0; i < 3; i++) {
  addCategory();
}
</script>

</body>
