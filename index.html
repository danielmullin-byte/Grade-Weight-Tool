<!DOCTYPE html>
<html>
<head>
  <title>Grade Weight Visualizer</title>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>

    body {
      font-family: Arial;
      background: #f4f4f4;
      padding: 20px;
    }

    .container {
      max-width: 900px;
      margin: auto;
      background: white;
      padding: 20px;
      border-radius: 10px;
    }

    h1 {
      text-align: center;
    }

    .row {
      display: grid;
      grid-template-columns: 2fr 1fr 1fr 80px;
      gap: 10px;
      margin-bottom: 10px;
    }

    input {
      padding: 8px;
      font-size: 16px;
    }

    button {
      padding: 8px;
      cursor: pointer;
    }

    #chartContainer {
      width: 400px;
      margin: 30px auto;
    }

    #finalGrade {
      font-size: 28px;
      text-align: center;
      margin-top: 20px;
    }

    #weightMessage {
      text-align: center;
      font-weight: bold;
      margin-top: 10px;
    }

  </style>
</head>

<body>

<div class="container">

  <h1>Grade Weight Visualizer</h1>

  <div class="row">
    <strong>Category</strong>
    <strong>Grade</strong>
    <strong>Weight</strong>
    <strong>Delete</strong>
  </div>

  <div id="rows"></div>

  <button onclick="addRow()">
    Add Category
  </button>

  <div id="finalGrade">
    Final Grade: 0%
  </div>

  <div id="weightMessage"></div>

  <div id="chartContainer">
    <canvas id="pieChart"></canvas>
  </div>

</div>

<script>

let chart;

function addRow(name="", grade="", weight="") {

  const totalRows =
    document.querySelectorAll(".gradeRow").length;

  if (totalRows >= 10) {
    alert("Maximum 10 categories");
    return;
  }

  const row = document.createElement("div");

  row.className = "row gradeRow";

  row.innerHTML = `

    <input class="category"
      placeholder="Homework"
      value="${name}">

    <input class="grade"
      type="number"
      min="0"
      max="100"
      value="${grade}">

    <input class="weight"
      type="number"
      min="0"
      max="100"
      value="${weight}">

    <button onclick="deleteRow(this)">
      X
    </button>

  `;

  document.getElementById("rows")
    .appendChild(row);

  row.querySelectorAll("input")
    .forEach(input => {
      input.addEventListener("input", updateChart);
    });

  updateChart();
}

function deleteRow(button) {

  button.parentElement.remove();

  updateChart();
}

function updateChart() {

  const rows =
    document.querySelectorAll(".gradeRow");

  let labels = [];
  let weights = [];

  let weightedPoints = 0;
  let totalWeight = 0;

  rows.forEach((row, index) => {

    const category =
      row.querySelector(".category").value
      || `Category ${index + 1}`;

    const grade =
      Number(row.querySelector(".grade").value);

    const weight =
      Number(row.querySelector(".weight").value);

    if (weight > 0) {

      labels.push(category);
      weights.push(weight);

      weightedPoints += grade * weight;

      totalWeight += weight;
    }
  });

  let finalGrade = 0;

  if (totalWeight > 0) {
    finalGrade =
      (weightedPoints / totalWeight)
      .toFixed(1);
  }

  document.getElementById("finalGrade")
    .innerHTML =
    `Final Grade: <strong>${finalGrade}%</strong>`;

  const msg =
    document.getElementById("weightMessage");

  if (totalWeight < 100) {

    msg.innerHTML =
      `Weights total ${totalWeight}% (Need 100%)`;

    msg.style.color = "orange";
  }

  else if (totalWeight > 100) {

    msg.innerHTML =
      `Weights total ${totalWeight}% (Too High!)`;

    msg.style.color = "red";
  }

  else {

    msg.innerHTML =
      `Weights total 100%`;

    msg.style.color = "green";
  }

  if (chart) {
    chart.destroy();
  }

  chart = new Chart(

    document.getElementById("pieChart"),

    {
      type: "pie",

      data: {

        labels: labels,

        datasets: [{

          data: weights,

          backgroundColor: [
            "#4caf50",
            "#2196f3",
            "#ff9800",
            "#9c27b0",
            "#f44336",
            "#009688",
            "#795548",
            "#3f51b5",
            "#607d8b",
            "#e91e63"
          ]

        }]
      }
    }
  );
}

addRow("Homework", 90, 20);
addRow("Quizzes", 80, 30);
addRow("Tests", 70, 50);

</script>

</body>
</html>
