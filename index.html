<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grade Weight Visualizer</title>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #eef2f7;
      margin: 0;
      padding: 20px;
    }

    .container {
      max-width: 1100px;
      margin: auto;
      background: white;
      padding: 25px;
      border-radius: 16px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }

    h1 {
      text-align: center;
      margin-bottom: 10px;
    }

    .description {
      text-align: center;
      color: #555;
      margin-bottom: 25px;
    }

    .main-layout {
      display: grid;
      grid-template-columns: 1fr 400px;
      gap: 30px;
      align-items: start;
    }

    .header-row,
    .category-row {
      display: grid;
      grid-template-columns: 2fr 1fr 1fr 80px;
      gap: 10px;
      margin-bottom: 10px;
    }

    .header-row {
      font-weight: bold;
      margin-bottom: 15px;
    }

    input {
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 15px;
    }

    button {
      border: none;
      border-radius: 8px;
      padding: 10px;
      cursor: pointer;
      font-size: 15px;
    }

    .add-btn {
      background: #2e7d32;
      color: white;
      margin-top: 10px;
    }

    .delete-btn {
      background: #c62828;
      color: white;
    }

    .stats {
      margin-top: 20px;
      padding: 15px;
      background: #f5f5f5;
      border-radius: 12px;
    }

    .stats h2 {
      margin-top: 0;
    }

    .warning {
      color: #c62828;
      font-weight: bold;
      margin-top: 10px;
    }

    canvas {
      width: 100% !important;
      max-width: 400px;
      height: auto !important;
    }

    @media (max-width: 850px) {
      .main-layout {
        grid-template-columns: 1fr;
      }

      canvas {
        margin: auto;
      }
    }
  </style>
</head>

<body>

<div class="container">

  <h1>Grade Weight Visualizer</h1>

  <div class="description">
    Edit categories, grades, and weights to see how weighted grading works.
  </div>

  <div class="main-layout">

    <div>

      <div class="header-row">
        <div>Category</div>
        <div>Grade %</div>
        <div>Weight %</div>
        <div>Delete</div>
      </div>

      <div id="categories"></div>

      <button class="add-btn" onclick="addCategory()">
        Add Category
      </button>

      <div class="stats">
        <h2 id="finalGrade">Final Grade: 0%</h2>
        <div id="weightTotal">Total Weight: 0%</div>
        <div id="warning" class="warning"></div>
      </div>

    </div>

    <div>
      <canvas id="gradeChart"></canvas>
    </div>

  </div>

</div>

<script>

let chart;
let categoryId = 0;
const maxCategories = 10;

function addCategory(name="", grade="", weight="") {

  const currentRows =
    document.querySelectorAll(".category-row").length;

  if (currentRows >= maxCategories) {
    alert("Maximum of 10 categories.");
    return;
  }

  categoryId++;

  const row = document.createElement("div");
  row.className = "category-row";
  row.id = `row${categoryId}`;

  row.innerHTML = `
    <input type="text"
      placeholder="Homework"
      value="${name}"
      class="name">

    <input type="number"
      placeholder="90"
      class="grade"
      min="0"
      max="100"
      value="${grade}">

    <input type="number"
      placeholder="20"
      class="weight"
      min="0"
      max="100"
      value="${weight}">

    <button class="delete-btn"
      onclick="deleteCategory('row${categoryId}')">
      X
    </button>
  `;

  document.getElementById("categories")
    .appendChild(row);

  row.querySelectorAll("input")
    .forEach(input => {
      input.addEventListener("input", updateChart);
    });

  updateChart();
}

function deleteCategory(id) {
  document.getElementById(id).remove();
  updateChart();
}

function updateChart() {

  const rows =
    document.querySelectorAll(".category-row");

  let labels = [];
  let weights = [];

  let weightedTotal = 0;
  let totalWeight = 0;

  rows.forEach((row, index) => {

    const name =
      row.querySelector(".name").value ||
      `Category ${index + 1}`;

    const grade =
      Number(row.querySelector(".grade").value);

    const weight =
      Number(row.querySelector(".weight").value);

    if (!isNaN(grade) &&
        !isNaN(weight) &&
        weight > 0) {

      labels.push(name);
      weights.push(weight);

      weightedTotal += grade * weight;
      totalWeight += weight;
    }
  });

  const finalGrade =
    totalWeight > 0
    ? (weightedTotal / totalWeight).toFixed(1)
    : 0;

  document.getElementById("finalGrade")
    .innerHTML =
    `Final Grade: <strong>${finalGrade}%</strong>`;

  document.getElementById("weightTotal")
    .innerHTML =
    `Total Weight: <strong>${totalWeight}%</strong>`;

  const warning = document.getElementById("warning");

  if (totalWeight < 100) {
    warning.textContent =
      "Weights must add up to 100%.";
  }
  else if (totalWeight > 100) {
    warning.textContent =
      "Weights are OVER 100%!";
  }
  else {
    warning.textContent =
      "Perfect! Weights total 100%.";
  }

  if (chart) {
    chart.destroy();
  }

  chart = new Chart(
    document.getElementById("gradeChart"),
    {
      type: "pie",

      data: {
        labels: labels,
        datasets: [{
          data: weights
        }]
      },

      options: {
        plugins: {
          legend: {
            position: "bottom"
          }
        }
      }
    }
  );
}

addCategory("Homework", 90, 20);
addCategory("Quizzes", 80, 30);
addCategory("Tests", 70, 50);

</script>

</body>
</html>
